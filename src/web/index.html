<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMNIX — Code Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js",
      "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/",
      "three-spritetext": "https://cdn.jsdelivr.net/npm/three-spritetext@1.10.0/dist/three-spritetext.mjs",
      "3d-force-graph": "https://esm.sh/3d-force-graph@1.74.0?target=es2020&external=three&deps=three@0.170.0"
    }
  }
  </script>
  <style>
    :root {
      --bg: #0A0A0F;
      --bg-fog: #050508;
      --node-file: #4FC3F7;
      --node-func: #81C784;
      --node-class: #FFB74D;
      --node-module: #BA68C8;
      --node-dark: #FF5252;
      --node-entgl: #E040FB;
      --edge-default: rgba(255, 255, 255, 0.15);
      --edge-import: #4FC3F7;
      --edge-call: #81C784;
      --edge-data: #FFD54F;
      --ui-text: #E0E0E0;
      --ui-mute: #888888;
      --ui-accent: #4FC3F7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ui-text);
    }
    #graph-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }
    #graph-container canvas { display: block; outline: none; width: 100% !important; height: 100% !important; }
    .hud {
      position: fixed;
      z-index: 20;
      pointer-events: none;
    }
    .hud * { pointer-events: auto; }
    .glass {
      background: rgba(10, 10, 15, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(79, 195, 247, 0.15);
      border-radius: 10px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    #search-panel-wrap {
      display: flex;
      flex-direction: column;
      top: 20px;
      left: 20px;
      padding: 10px 14px;
      min-width: 300px;
      max-width: min(420px, calc(100vw - 40px));
    }
    #search-panel { display: flex; align-items: center; gap: 10px; width: 100%; padding: 0; }
    .search-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--ui-accent);
    }
    #search-input {
      flex: 1;
      min-width: 0;
      background: rgba(5, 5, 8, 0.7);
      border: 1px solid rgba(136, 136, 136, 0.25);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--ui-text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    #search-input:focus { outline: none; border-color: var(--ui-accent); }
    #search-input::placeholder { color: var(--ui-mute); }
    #search-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ui-mute); white-space: nowrap; }
    #stats-panel {
      top: 20px; right: 20px; padding: 14px 18px; min-width: 200px;
    }
    .stats-title {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase; color: #a78bfa; margin-bottom: 10px;
    }
    .stat-row { display: flex; justify-content: space-between; gap: 16px; font-size: 12px; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
    .stat-row span:first-child { color: #94a3b8; }
    .stat-val { color: #4ade80; text-align: right; }
    #breadcrumb {
      top: 20px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center;
      max-width: min(90vw, 720px);
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .crumb { color: #94a3b8; cursor: default; padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(79, 195, 247, 0.2); }
    .crumb.current { color: var(--ui-text); }
    #tooltip { position: fixed; z-index: 30; display: none; max-width: 380px; padding: 12px 14px; pointer-events: none;
      font-size: 12px; line-height: 1.45; background: rgba(5, 5, 8, 0.95);
      border: 1px solid rgba(79, 195, 247, 0.25); border-radius: 8px; }
    .tooltip-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; color: #fff; margin-bottom: 6px; }
    .tooltip-type { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
    .tooltip-file { color: #94a3b8; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .tooltip-lines { color: #64748b; font-size: 11px; margin-top: 6px; }
    #bottom-bar {
      bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-size: 12px; flex-wrap: wrap; justify-content: center;
    }
    #omnix-version { font-family: 'Syne', sans-serif; letter-spacing: 0.15em; font-size: 10px; color: var(--ui-mute); margin-right: 8px; }
    #bottom-bar button {
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 6px;
      border: 1px solid rgba(136, 136, 136, 0.3); background: rgba(20, 20, 28, 0.7); color: #cbd5e1; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    #bottom-bar button:hover { border-color: var(--ui-accent); color: #fff; }
    #fps-counter { font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 8px; }
    #entrance { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .ent-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 0.08em; color: #E0E0E0; }
    .ent-sub { margin-top: 16px; font-size: 14px; color: var(--ui-mute); }
    .ent-skip { position: absolute; bottom: 28px; font-size: 11px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; }
    #loading-error { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: var(--bg); padding: 24px; text-align: center; }
    #loading-error.visible { display: flex; }
    #loading-error .msg { max-width: 440px; color: #f87171; font-size: 15px; line-height: 1.5; }
    #loading-error .sub { margin-top: 12px; font-size: 12px; color: #94a3b8; }
    #ui-fade { opacity: 0; transition: opacity 0.5s ease; }
    #ui-fade.visible { opacity: 1; }
    #timeline-panel { z-index: 19; }
    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #a855f7; cursor: pointer; border: none;
    }
    #xray-panel::-webkit-scrollbar { width: 4px; }
    #xray-panel { scrollbar-width: thin; }
  </style>
</head>
<body>
  <div id="loading-error" aria-live="polite">
    <div>
      <div class="msg" id="loading-error-msg"></div>
      <div class="sub">Open DevTools (F12) for details.</div>
    </div>
  </div>
  <div id="entrance" title="Click to skip">
    <div class="ent-title" id="ent-title">OMNIX</div>
    <div class="ent-sub" id="ent-sub">Constellation view</div>
    <div class="ent-skip">Click to continue</div>
  </div>
  <div id="ui-fade">
    <div id="graph-container"></div>
    <div class="hud glass" id="search-panel-wrap">
      <div id="search-panel">
        <span class="search-label">FIND</span>
        <input type="text" id="search-input" placeholder="symbol, file, path…" autocomplete="off" />
        <span id="search-count"></span>
      </div>
      <div id="search-hint" style="display:none;margin-top:8px;font-size:11px;color:var(--ui-mute);font-family:'JetBrains Mono',monospace;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    </div>
    <div class="hud glass" id="stats-panel">
      <div class="stats-title">GRAPH</div>
      <div class="stat-row"><span>Files</span><span class="stat-val" id="stat-files">0</span></div>
      <div class="stat-row"><span>Functions</span><span class="stat-val" id="stat-functions">0</span></div>
      <div class="stat-row"><span>Classes</span><span class="stat-val" id="stat-classes">0</span></div>
      <div class="stat-row"><span>Edges</span><span class="stat-val" id="stat-edges">0</span></div>
      <div class="stat-row"><span>Dark Matter</span><span class="stat-val" id="stat-dark" style="color:#8b5cf6">0</span></div>
      <div class="stat-row"><span>Entangled</span><span class="stat-val" id="stat-entangled" style="color:#E040FB">0</span></div>
    </div>
    <div class="hud glass" id="breadcrumb">
      <span class="crumb current" data-level="galaxy">OMNIX</span>
    </div>
    <div id="tooltip">
      <div class="tooltip-name"></div>
      <div class="tooltip-type"></div>
      <div class="tooltip-file"></div>
      <div class="tooltip-lines"></div>
    </div>
    <div id="timeline-panel" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:none;z-index:100;
      background:rgba(10,10,15,0.9);border:1px solid rgba(79,195,247,0.15);border-radius:10px;padding:10px 20px;min-width:min(90vw,720px)">
      <div style="display:flex;align-items:center;gap:12px">
        <span id="timeline-date" style="color:#a855f7;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:90px">—</span>
        <input type="range" id="timeline-slider" min="0" max="99" value="99" style="flex:1;-webkit-appearance:none;height:4px;background:#333;border-radius:2px;cursor:pointer" />
        <span id="timeline-date-end" style="color:#06b6d4;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:90px;text-align:right">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span id="timeline-info" style="color:var(--ui-mute);font-size:11px">Timeline (visualization placeholder)</span>
        <span id="timeline-stats" style="color:var(--ui-mute);font-size:11px"></span>
      </div>
    </div>
    <div class="hud glass" id="bottom-bar">
      <span id="omnix-version">OMNIX V0.1</span>
      <button type="button" id="btn-fullscreen">Fullscreen</button>
      <button type="button" id="btn-dark-matter" style="opacity:0.5">🌀 Dark Matter</button>
      <button type="button" id="btn-timeline" style="display:none;opacity:0.5">⏳ Timeline</button>
      <button type="button" id="btn-export">Export JSON</button>
      <span id="fps-counter">— FPS</span>
    </div>
  </div>
  <div id="xray-panel" style="position:fixed;top:0;right:-400px;width:380px;height:100vh;background:rgba(5,5,8,0.96);
    border-left:1px solid rgba(79,195,247,0.2);z-index:200;overflow-y:auto;padding:24px 20px;transition:right 0.35s ease;box-sizing:border-box">
    <div id="xray-close" style="position:absolute;top:12px;right:16px;cursor:pointer;font-size:20px;color:var(--ui-mute)">✕</div>
    <div id="xray-content" style="font-size:13px;font-family:'Outfit',sans-serif"></div>
  </div>
  <script type="module">
  import * as THREE from 'three';
  import { WebGPURenderer } from 'three/webgpu';
  import ForceGraph3D from '3d-force-graph';
  import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
  import SpriteText from 'three-spritetext';
  const GRAPH_API = (() => { try { if (location.protocol === 'file:' || !location.origin) return null; return new URL('/api/graph', location.origin).href; } catch { return null; } })();
  const TIMELINE_API = (() => { try { if (location.protocol === 'file:' || !location.origin) return null; return new URL('/api/timeline', location.origin).href; } catch { return null; } })();

  function nId(n) { return typeof n === 'object' && n && n.id != null ? n.id : n; }

  function normalizeType(t) { return (t == null ? '' : String(t)).toLowerCase(); }

  function edgeKind(link) {
    const t = normalizeType(link.type);
    if (t === 'imports' || t === 'import') return 'import';
    if (t === 'calls' || t === 'call' || t === 'defines' || t === 'define' || t === 'decorates') return 'call';
    if (t === 'inherits' || t === 'inherit') return 'inherit';
    if (t === 'dark_force' || t === 'data_flow' || t === 'dark') return 'data_flow';
    if (t === 'entangled') return 'entangled';
    return 'default';
  }

  function linkHex(link) {
    const k = edgeKind(link);
    if (k === 'import') return 0x4fc3f7;
    if (k === 'call' || k === 'inherit') return 0x81c784;
    if (k === 'data_flow') return 0xffd54f;
    if (k === 'entangled') return 0xe040fb;
    return 0xffffff;
  }

  let entangledSet = new Set();
  let darkMatterView = false;
  let hovered = null;
  let searchMatchIds = new Set();
  let searchDimActive = false;
  let rawGraphExport = null;

  function baseRadius(node) {
    const lines = node.lines != null ? node.lines : (node.val != null ? node.val : 1);
    let r = Math.max(2, Math.log10(Math.max(0, lines) + 1) * 3);
    const nt = normalizeType(node.type);
    if (nt === 'dark_matter' || node.is_dark_matter) r *= 1.3;
    if (entangledSet.has(node.id)) r *= 1.2;
    return r;
  }

  function nodeValAccessor(node) {
    const r = baseRadius(node);
    return r * r * r;
  }

  function nodeColorFor(node) {
    const nt = normalizeType(node.type);
    if (darkMatterView && nt !== 'dark_matter' && !node.is_dark_matter) return new THREE.Color(0x666666);
    if (nt === 'dark_matter' || node.is_dark_matter) return new THREE.Color(0xff5252);
    if (entangledSet.has(node.id)) return new THREE.Color(0xe040fb);
    if (nt === 'file') return new THREE.Color(0x4fc3f7);
    if (nt === 'class') return new THREE.Color(0xffb74d);
    if (nt === 'import' || nt === 'module') return new THREE.Color(0xba68c8);
    return new THREE.Color(0x81c784);
  }

  async function testWebGPU() {
    if (!navigator.gpu) { console.info('[OMNIX] WebGPU: navigator.gpu unavailable'); return; }
    try {
      const w = new WebGPURenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
      if (w.init) await w.init();
      w.dispose();
      console.info('[OMNIX] WebGPU: available (3d-force-graph uses WebGL2 pipeline; bloom via EffectComposer)');
    } catch (e) {
      console.info('[OMNIX] WebGPU init test failed', e);
    }
  }

  function errShow(msg) {
    const e = document.getElementById('loading-error');
    const m = document.getElementById('loading-error-msg');
    if (m) m.textContent = msg;
    e && e.classList.add('visible');
  }

  async function loadGraph() {
    let raw;
    const tryUrls = [];
    if (GRAPH_API) tryUrls.push(GRAPH_API);
    try { tryUrls.push(new URL('graph_data.json', window.location.href).href); } catch { /* */ }
    let lastErr;
    for (const u of tryUrls) {
      try {
        const r = await fetch(u, { cache: 'no-store' });
        if (r.ok) { raw = await r.json(); break; }
        lastErr = r.status;
      } catch (e) { lastErr = e; }
    }
    if (!raw) {
      errShow('Could not load graph (run: python omnix.py analyze <path> — or add src/web/graph_data.json).');
      throw new Error(String(lastErr || 'load failed'));
    }
    const links = Array.isArray(raw.links) ? raw.links : (raw.edges || []);
    const nodes = (raw.nodes || []).map(n => {
      const path = n.path != null ? n.path : (n.file != null ? n.file : '');
      const lines = n.lines != null ? n.lines : (n.line != null ? n.line : (n.val != null ? n.val : 1));
      return { ...n, path, lines, type: n.type || 'function', name: n.name != null ? n.name : n.id, is_entangled: !!n.is_entangled, is_dark_matter: n.is_dark_matter || n.type === 'dark_matter' };
    });
    return { graphData: { nodes, links: links.map(l => ({ ...l, type: l.type, weight: l.weight != null ? l.weight : 0.5 })) }, stats: raw.stats || {} };
  }

  function buildEntangled(links) {
    const s = new Set();
    for (const l of links) {
      if (normalizeType(l.type) === 'entangled' || l.type === 'ENTANGLED') {
        s.add(nId(l.source));
        s.add(nId(l.target));
      }
    }
    return s;
  }

  function adjacency(nodes, links) {
    const m = new Map();
    for (const n of nodes) m.set(n.id, new Set());
    for (const l of links) {
      const a = nId(l.source), b = nId(l.target);
      if (!m.has(a) || !m.has(b)) continue;
      m.get(a).add(b);
      m.get(b).add(a);
    }
    return m;
  }

  let globalAdj = new Map();
  let Graph = null;
  let lastSprite = null;
  let lastSpriteNode = null;
  let initialCam = null;
  let lastInteract = performance.now();
  let searchStartMs = 0;
  const container = document.getElementById('graph-container');

  function countConn(id) {
    const s = globalAdj.get(id);
    return s ? s.size : 0;
  }

  function linkOpacityFn(link) {
    const w = link.weight != null ? link.weight : 0.5;
    const base = 0.1 + w * 0.3;
    if (!hovered) return base;
    const h = hovered.id;
    const a = nId(link.source), b = nId(link.target);
    if (a === h || b === h) return 1;
    return 0.05;
  }

  function linkWidthFn(link) {
    const w = link.weight != null ? link.weight : 0.5;
    return 0.2 + w * 0.8;
  }

  function nodeOpacityFn(node) {
    if (searchDimActive && !searchMatchIds.has(node.id)) return 0.4;
    if (darkMatterView && normalizeType(node.type) !== 'dark_matter' && !node.is_dark_matter) return 0.4;
    return 0.92;
  }

  (async function main() {
    if (!container) { errShow('DOM missing #graph-container'); return; }
    await testWebGPU();
    let gdata;
    try {
      const loaded = await loadGraph();
      gdata = loaded.graphData;
      rawGraphExport = { nodes: gdata.nodes, links: gdata.links, stats: loaded.stats };
      const st = loaded.stats || {};
      const setEl = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v != null ? String(v) : '0'; };
      setEl('stat-files', st.files);
      setEl('stat-functions', st.functions);
      setEl('stat-classes', st.classes);
      setEl('stat-edges', st.edges != null ? st.edges : gdata.links.length);
      setEl('stat-dark', st.dark_matter);
      setEl('stat-entangled', st.entangled);
    } catch (e) {
      errShow(e.message || String(e));
      return;
    }
    entangledSet = buildEntangled(gdata.links);
    globalAdj = adjacency(gdata.nodes, gdata.links);

    function sceneUpdate(tsec) {
      if (!Graph) return;
      const now = performance.now();
      const inSearch = searchStartMs > 0 && (now - searchStartMs < 2000);
      if (inSearch) {
        for (const id of searchMatchIds) {
          const n = gdata.nodes.find(x => x.id === id);
          if (n && n.__threeObj) n.__threeObj.scale.setScalar(1.4 + 0.25 * Math.sin(tsec * 14));
        }
        if (now - searchStartMs >= 2000) {
          searchStartMs = 0; searchMatchIds = new Set(); searchDimActive = false;
          for (const n of gdata.nodes) { if (n.__threeObj) n.__threeObj.scale.setScalar(1); }
          Graph.refresh();
        }
      } else for (const n of gdata.nodes) {
        if (n.__threeObj) {
          if (hovered && n.id === hovered.id) n.__threeObj.scale.setScalar(1.5);
          else n.__threeObj.scale.setScalar(1);
        }
      }
      if (lastSprite && lastSpriteNode) {
        lastSprite.position.set(lastSpriteNode.x || 0, (lastSpriteNode.y || 0) + 4, lastSpriteNode.z || 0);
      }
      if (Graph.controls()) { Graph.controls().autoRotate = (now - lastInteract) > 5000; Graph.controls().autoRotateSpeed = 0.35; }
    }

    Graph = new ForceGraph3D(container, {
      controlType: 'orbit',
      rendererConfig: { antialias: true, alpha: false, powerPreference: 'high-performance' }
    })
      .graphData(gdata)
      .backgroundColor('#0A0A0F')
      .nodeId('id')
      .linkSource('source')
      .linkTarget('target')
      .nodeVal(nodeValAccessor)
      .nodeRelSize(0.12)
      .nodeResolution(8)
      .nodeColor(n => '#' + nodeColorFor(n).getHexString())
      .nodeOpacity(nodeOpacityFn)
      .linkWidth(linkWidthFn)
      .linkCurvature(0.22)
      .linkResolution(4)
      .linkOpacity(linkOpacityFn)
      .linkColor(l => linkHex(l))
      .linkDirectionalParticles(l => (edgeKind(l) === 'data_flow' ? 2 : 0))
      .linkDirectionalParticleSpeed(0.006)
      .linkDirectionalParticleWidth(1.5)
      .linkDirectionalParticleColor(0xffd54f)
      .nodeLabel(n => {
        const a = (n.name || n.id).replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const b = (n.path || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
        return a + '\n' + b;
      })
      .enableNodeDrag(false)
      .d3AlphaDecay(0.02)
      .d3VelocityDecay(0.3)
      .cooldownTicks(200)
      .onEngineTick(() => {
        const t = performance.now() * 0.001;
        sceneUpdate(t);
      });

    Graph.width(window.innerWidth).height(window.innerHeight);
    const ren = Graph.renderer();
    const sc = Graph.scene();
    sc.fog = new THREE.FogExp2(0x050508, 0.0015);
    ren.toneMapping = THREE.ACESFilmicToneMapping;
    ren.toneMappingExposure = 1;
    if (ren.outputColorSpace !== undefined) ren.outputColorSpace = THREE.SRGBColorSpace;
    const sz = new THREE.Vector2();
    ren.getSize(sz);
    const bloom = new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.7, 0.4, 0.85);
    const comp = Graph.postProcessingComposer();
    if (comp) { comp.addPass(bloom); }

    const ctr = Graph.controls();
    if (ctr) {
      ctr.enableDamping = true;
      ctr.dampingFactor = 0.05;
      ctr.minDistance = 1;
      ctr.maxDistance = 1e5;
    }

    console.info('[OMNIX] Renderer: WebGL2 (Three.js) — 3d-force-graph + UnrealBloom');

    window.addEventListener('resize', () => {
      Graph.width(window.innerWidth).height(window.innerHeight);
      ren.getSize(sz);
      if (bloom && bloom.setSize) bloom.setSize(container.clientWidth, container.clientHeight);
    });

    setTimeout(() => {
      Graph.zoomToFit(0, 50);
      setTimeout(() => {
        Graph.zoomToFit(900, 50);
        setTimeout(() => { saveInitialCam(); }, 950);
      }, 200);
    }, 400);

    const el = ren.domElement;
    ['pointerdown', 'wheel', 'touchstart'].forEach(ev => { el.addEventListener(ev, () => { lastInteract = performance.now(); if (Graph && Graph.controls()) { Graph.controls().autoRotate = false; } }, { passive: true }); });
    if (Graph.controls()) { Graph.controls().addEventListener('start', () => { lastInteract = performance.now(); Graph.controls().autoRotate = false; }); }

    function saveInitialCam() {
      const c = Graph.camera();
      if (!initialCam) initialCam = { p: c.position.clone(), t: (Graph.controls() && Graph.controls().target) ? Graph.controls().target.clone() : new THREE.Vector3() };
    }

    Graph.onNodeHover(node => {
      hovered = node;
      Graph && Graph.refresh();
    });

    function flyToNode(node) {
      if (!node) return;
      const d = 120;
      const dist = Math.hypot(node.x || 0, node.y || 0, node.z || 0) || 200;
      const f = 1 + d / Math.max(10, dist);
      Graph.cameraPosition(
        { x: (node.x || 0) * f, y: (node.y || 0) * f, z: (node.z || 0) * f },
        { x: node.x || 0, y: node.y || 0, z: node.z || 0 },
        1200
      );
    }

    Graph.onNodeClick(node => {
      if (!node) return;
      lastInteract = performance.now();
      const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
      document.getElementById('xray-content').innerHTML = `<div style="color:#4FC3F7;font-size:12px;letter-spacing:0.1em">NODE</div>
        <h2 style="font-family:JetBrains Mono,monospace;margin:8px 0 12px">${esc(node.name || node.id)}</h2>
        <div style="color:var(--ui-mute)"><span style="color:var(--ui-text)">Path</span><br/><code style="font-size:12px;word-break:break-all">${String(node.path || '—')}</code></div>
        <div style="margin-top:10px">Lines: <b>${(node.lines != null ? node.lines : '—')}</b> · type: <b>${node.type || '—'}</b> · degree: <b>${countConn(node.id)}</b></div>`;
      const p = document.getElementById('xray-panel');
      if (p) p.style.right = '0';
      if (sc && lastSprite) { sc.remove(lastSprite); lastSprite = null; }
      if (sc) {
        lastSprite = new SpriteText(String(node.name || node.id));
        lastSprite.color = 0x4fc3f7;
        lastSprite.textHeight = 3.2;
        lastSprite.position.set(node.x || 0, (node.y || 0) + 3, node.z || 0);
        sc.add(lastSprite);
        lastSpriteNode = node;
      }
      flyToNode(node);
    });

    Graph.onBackgroundClick(() => {
      hovered = null; lastSpriteNode = null; Graph && Graph.refresh();
      const p = document.getElementById('xray-panel'); if (p) p.style.right = '-400px';
      if (sc && lastSprite) { sc.remove(lastSprite); lastSprite = null; }
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim().toLowerCase();
        if (!q) return;
        const m = gdata.nodes.filter(n => (n.id + (n.name || '') + (n.path || '')).toLowerCase().includes(q));
        if (!m.length) { document.getElementById('search-hint').style.display = 'block'; document.getElementById('search-hint').textContent = 'No match'; return; }
        const node = m[0];
        document.getElementById('search-hint').style.display = 'block';
        document.getElementById('search-hint').textContent = node.id;
        searchMatchIds = new Set(m.map(x => x.id));
        searchDimActive = true; searchStartMs = performance.now();
        Graph && Graph.refresh();
        flyToNode(node);
      }
    });

    let fpsAcc = 0, fpsN = 0, lastF = performance.now();
    function tickFps() {
      const now = performance.now();
      const d = now - lastF; lastF = now;
      fpsAcc += 1000 / d; fpsN++;
      if (fpsN > 20) { const f = Math.round(fpsAcc / fpsN);
        const out = document.getElementById('fps-counter');
        if (out) { out.textContent = f + ' FPS'; out.style.color = f >= 50 ? '#4ade80' : (f >= 30 ? '#f59e0b' : '#f87171'); }
        fpsAcc = 0; fpsN = 0; }
      requestAnimationFrame(tickFps);
    }
    requestAnimationFrame(tickFps);

    document.getElementById('btn-fullscreen').onclick = () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); };
    const dmBtn = document.getElementById('btn-dark-matter');
    dmBtn.onclick = () => {
      darkMatterView = !darkMatterView;
      dmBtn.style.opacity = darkMatterView ? '1' : '0.5';
      Graph && Graph.refresh();
    };
    document.getElementById('btn-timeline').onclick = () => {
      const t = document.getElementById('timeline-panel');
      t.style.display = t.style.display === 'none' ? 'block' : 'none';
    };
    document.getElementById('btn-export').onclick = () => {
      const blob = new Blob([JSON.stringify(rawGraphExport, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'graph_data.json'; a.click();
    };
    document.getElementById('xray-close').onclick = () => {
      const scn = Graph && Graph.scene();
      if (scn && lastSprite) { scn.remove(lastSprite); lastSprite = null; }
      lastSpriteNode = null;
      document.getElementById('xray-panel').style.right = '-400px';
    };

    window.addEventListener('keydown', e => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key === 'r' || e.key === 'R') { if (initialCam) { Graph.cameraPosition({ x: initialCam.p.x, y: initialCam.p.y, z: initialCam.p.z }, { x: initialCam.t.x, y: initialCam.t.y, z: initialCam.t.z }, 800); } }
      if (e.key === 'f' || e.key === 'F') Graph && Graph.zoomToFit(1000, 50);
    });

    if (TIMELINE_API) {
      try {
        const r = await fetch(TIMELINE_API, { cache: 'no-store' });
        if (r.ok) {
          const tj = await r.json();
          const btn = document.getElementById('btn-timeline');
          if (Array.isArray(tj) && tj.length) {
            btn.style.display = 'inline';
            const sl = document.getElementById('timeline-slider');
            if (sl) { sl.max = String(Math.max(0, tj.length - 1)); sl.value = String(tj.length - 1); }
            document.getElementById('timeline-date').textContent = tj[0] && tj[0].date || '—';
            const last = tj[tj.length - 1];
            document.getElementById('timeline-date-end').textContent = last && last.date || '—';
            document.getElementById('timeline-stats').textContent = tj.length + ' commits (scrub: no graph rebuild yet)';
          }
        }
      } catch { /* */ }
    }

    const en = document.getElementById('entrance');
    en.addEventListener('click', () => { en.style.display = 'none'; document.getElementById('ui-fade').classList.add('visible'); });
  })();
  </script>
</body>
</html>
