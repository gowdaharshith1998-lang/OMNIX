version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-runtime:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/services/scientist-python"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/src/omnix/studio/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/github-app"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/scientist-node"
    schedule:
      interval: "weekly"
