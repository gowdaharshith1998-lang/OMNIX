# SPA-friendly nginx config for OMNIX Studio (served by studio.Dockerfile).
server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the index.html shell — bundle hashes change.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Lightweight in-cluster health probe (the chart's readiness/liveness
    # probes hit `/`; this endpoint avoids serving the bundle for probes).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
