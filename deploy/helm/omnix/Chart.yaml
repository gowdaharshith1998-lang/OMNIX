apiVersion: v2
name: omnix
description: OMNIX behavioral replicator — air-gapped enterprise deployment (Shape B)
type: application
version: 0.1.0
appVersion: "0.6.1"
home: https://axiomcontrol.systems
sources:
  - https://github.com/gowdaharshith1998-lang/omnix
maintainers:
  - name: AXIOM Control Systems Inc.
keywords:
  - cobol
  - mainframe
  - modernization
  - migration
  - replication
  - fips-204
  - ml-dsa-65
dependencies:
  - name: mainframe
    version: 0.1.0
    condition: mainframe.enabled
    repository: "file://charts/mainframe"
  # CloudNativePG operator + opinionated Cluster CRD. Vanilla install
  # bootstraps its own primary + standby; operators flip the condition
  # off and supply postgres.external.dsn for production Aurora/RDS/CloudSQL.
  - name: cloudnative-pg
    version: "0.28.2"
    condition: postgres.subchart.enabled
    repository: "https://cloudnative-pg.github.io/charts"
    alias: cnpg-operator
  # Bitnami MinIO in standalone mode — single-replica S3-compatible
  # storage for in-cluster development + verify. Operators flip the
  # condition off and set storage.backend=s3 + AWS credentials for
  # production workloads against R2 / S3 / GCS.
  - name: minio
    version: "17.0.21"
    condition: minio.subchart.enabled
    repository: "https://charts.bitnami.com/bitnami"
annotations:
  category: DeveloperTools
  licenses: Proprietary
