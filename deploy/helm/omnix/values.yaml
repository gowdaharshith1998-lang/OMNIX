# OMNIX Helm values — defaults are sensible for a single-node dev cluster.
# Production overrides should be supplied via -f production-values.yaml.

global:
  image:
    registry: ghcr.io/gowdaharshith1998-lang
    pullPolicy: IfNotPresent
  storageClass: ""
  imagePullSecrets: []
  airgap:
    enabled: false

api:
  enabled: true
  replicaCount: 2
  image:
    repository: omnix-cloud-api
    tag: ""
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  env:
    OMNIX_DEBUG: "false"
    # Default to in-cluster MinIO so vanilla `helm install` reaches Ready
    # without operator-supplied AWS credentials. Operators point production
    # workloads at S3 by overriding this to "s3" and supplying credentials.
    OMNIX_STORAGE_BACKEND: minio
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

worker:
  enabled: true
  replicaCount: 4
  image:
    repository: omnix-cloud-api
    tag: ""
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi
  queues: ["omnix.default"]
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 32
    targetCPU: 70

studio:
  enabled: true
  replicaCount: 2
  image:
    repository: omnix-studio
    tag: ""
  service:
    type: ClusterIP
    port: 8081

verifier:
  enabled: true
  replicaCount: 2
  image:
    repository: omnix-verifier
    tag: ""
  service:
    type: ClusterIP
    port: 8090

postgres:
  enabled: true   # set false to disable all postgres wiring (api falls back to sqlite)
  # When true, the CloudNativePG subchart installs the operator and a
  # 1-primary + 1-standby Cluster CRD reconciles into managed Pods. Set
  # false to skip the operator and supply postgres.external.dsn instead.
  subchart:
    enabled: true
    replicas: 2
    storage:
      size: 8Gi
      className: ""
  # When non-empty, the api/worker/verifier use this DSN directly and the
  # subchart is skipped. Operators set this for Aurora / RDS / CloudSQL.
  external:
    dsn: ""
  image:
    repository: bitnami/postgresql
    tag: "16"
  auth:
    database: omnix
    username: omnix
    existingSecret: omnix-postgres
  persistence:
    enabled: true
    size: 100Gi

minio:
  # Bitnami MinIO subchart. When enabled, standalone single-replica MinIO
  # provides in-cluster S3-compatible storage. Operators set
  # storage.backend=s3 + supply AWS credentials for production R2/S3/GCS.
  subchart:
    enabled: true
  mode: standalone
  defaultBuckets: "omnix-uploads"
  auth:
    rootUser: omnix
    rootPassword: ""  # auto-generated when empty
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }

redis:
  enabled: true
  image:
    repository: bitnami/redis
    tag: "7"
  auth:
    existingSecret: omnix-redis
  persistence:
    enabled: true
    size: 10Gi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app.omnix.local
      paths: [{ path: /, pathType: Prefix, service: api }]
    - host: verify.omnix.local
      paths: [{ path: /, pathType: Prefix, service: verifier }]
    - host: studio.omnix.local
      paths: [{ path: /, pathType: Prefix, service: studio }]
  tls: []
  annotations:
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: 105g
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"

networkPolicy:
  enabled: true
  # Default-off ZTNA: when true, every pod is denied by default and only
  # explicit allow rules pass traffic. Breaks vanilla `helm install` without
  # the matching allow-profile so we default to false. Operators flip this
  # on in production once the allow rules are validated for their cluster.
  denyAll: false
  # When true, pods in the release namespace can reach each other (api ↔
  # redis ↔ postgres ↔ minio ↔ verifier ↔ worker) without explicit per-pod
  # rules. The allow-internal NetworkPolicy still applies.
  allowSameNamespace: true

pdb:
  enabled: true
  minAvailable: 1

llm:
  selfHosted:
    enabled: false
    image:
      repository: vllm/vllm-openai
      tag: latest
    gpus:
      requested: 2
      type: nvidia.com/gpu
    model:
      name: meta-llama/Meta-Llama-3.3-70B-Instruct
      quantization: fp8

rekor:
  enabled: false   # optional Sigstore Rekor v2 (Phase B4)
  image: "gcr.io/projectsigstore/rekor-server:v1.3.10"
  storage:
    size: 50Gi
    className: ""
  trillian:
    image: "gcr.io/trillian-opensource-ci/log_server:latest"
    signerImage: "gcr.io/trillian-opensource-ci/log_signer:latest"
    externalMysql:
      host: ""
      port: 3306
      database: trillian

ebpf:
  tetragon:
    enabled: false   # Phase B2 — requires kernel >=5.8
    image:
      repository: quay.io/cilium/tetragon
      tag: v1.4.0
    # Extra absolute paths to capture file_open events on, beyond /etc and /var/lib.
    filePaths: []
    # Kubernetes namespaces whose pods are eligible for capture. When empty,
    # the collector falls back to the release's namespace.
    namespaceAllowList: []

observe:
  collector:
    enabled: false
    replicaCount: 1
    # sink: memory | stdout | redis. Production should set redis + redisUrl.
    sink: memory
    redisUrl: ""
  # Customer-managed Kafka (Confluent Cloud, MSK, Strimzi). OMNIX deploys
  # Kafka Connect + Debezium plugins in-cluster and points them at this.
  kafka:
    bootstrapServers: ""
  cdc:
    enabled: false
    postgres: { enabled: false }
    mysql: { enabled: false }
    sqlserver: { enabled: false }
    oracle: { enabled: false }
    db2: { enabled: false }
  connect:
    image: "debezium/connect-with-omnix-plugins:2.7"
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2, memory: 4Gi }

mainframe:
  enabled: false
  tcvision:
    enabled: false
    topic: "tcvision.records"
    bootstrapServers: ""
  ironstream:
    enabled: false
    topic: "ironstream.smf"
    bootstrapServers: ""
  cprof:
    enabled: false
    topic: "cprof.cics"
    bootstrapServers: ""

facade:
  enabled: false
  legacyService: ""
  candidateServiceTemplate: ""
  envoyImage: "envoyproxy/envoy:v1.32.0"
  writerImage: ""
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

drata:
  enabled: false
  apiKeySecret: omnix-drata-api-key

sentry:
  enabled: false
  dsnSecret: omnix-sentry-dsn

mldsa:
  signingKeySecret: omnix-mldsa-signing
  verifyKeySecret: omnix-mldsa-verify
