{{- if and .Values.ebpf.tetragon.enabled .Values.observe.collector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnix.fullname" . }}-collector
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: observe-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    component: observe-collector
  ports:
  - { name: http, port: 9050, targetPort: http }
  - { name: metrics, port: 9051, targetPort: metrics }
{{- end }}
