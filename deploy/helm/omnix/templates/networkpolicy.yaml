{{- if .Values.networkPolicy.enabled }}
{{- if .Values.networkPolicy.denyAll }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "omnix.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
{{- end }}
{{- if or .Values.networkPolicy.denyAll .Values.networkPolicy.allowSameNamespace }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "omnix.fullname" . }}-allow-internal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Chart.Name }}
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  egress:
  {{- if .Values.networkPolicy.allowSameNamespace }}
  # Same-namespace peers — operator-supplied Redis / Postgres / MinIO /
  # external services co-deployed without the OMNIX label still need to
  # be reachable. ``allowSameNamespace=true`` opens the namespace, not
  # just other OMNIX pods. (allowSameNamespace=false but denyAll=true
  # falls back to the strict app-only egress below.)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
  {{- else }}
  # Strict: only other OMNIX-labeled pods in this namespace.
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Chart.Name }}
  {{- end }}
  # DNS resolution is required even for in-cluster service-name lookups.
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
{{- end }}
{{- end }}
