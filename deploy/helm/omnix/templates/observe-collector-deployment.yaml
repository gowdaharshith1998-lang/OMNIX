{{- if and .Values.ebpf.tetragon.enabled .Values.observe.collector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnix.fullname" . }}-collector
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: observe-collector
spec:
  replicas: {{ .Values.observe.collector.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      component: observe-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        component: observe-collector
    spec:
      containers:
      - name: collector
        image: {{ include "omnix.api.image" . }}
        command:
        - python
        - -m
        - omnix.cloud.observe.collector_service
        - --bind
        - "0.0.0.0:9050"
        env:
        - name: OMNIX_OBSERVE_SINK
          value: {{ .Values.observe.collector.sink | default "memory" | quote }}
        {{- if eq (.Values.observe.collector.sink | default "memory") "redis" }}
        - name: OMNIX_OBSERVE_REDIS_URL
          value: {{ .Values.observe.collector.redisUrl | quote }}
        {{- end }}
        ports:
        - { name: http, containerPort: 9050 }
        - { name: metrics, containerPort: 9051 }
        readinessProbe:
          httpGet: { path: /healthz, port: 9050 }
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /healthz, port: 9050 }
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests: { cpu: 200m, memory: 256Mi }
          limits:   { cpu: 1000m, memory: 1Gi }
{{- end }}
