{{- if .Values.facade.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnix.fullname" . }}-facade
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: facade
spec:
  replicas: {{ .Values.facade.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      component: facade
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        component: facade
    spec:
      initContainers:
      # Seed routes.json from the bootstrap ConfigMap into the shared emptyDir
      # so Envoy boots with 100% legacy on a fresh install. The writer sidecar
      # atomically replaces this file on every signed shift afterwards.
      - name: seed-routes
        image: busybox:1.36
        command: ["sh", "-c", "cp /seed/routes.json /etc/envoy/routes/routes.json"]
        volumeMounts:
        - { name: routes-seed, mountPath: /seed, readOnly: true }
        - { name: routes,      mountPath: /etc/envoy/routes }
      containers:
      - name: envoy
        image: {{ .Values.facade.envoyImage | quote }}
        args:
        - "-c"
        - /etc/envoy/envoy.yaml
        - "--log-level"
        - info
        ports:
        - { name: http, containerPort: 8080 }
        - { name: admin, containerPort: 9901 }
        readinessProbe:
          httpGet: { path: /ready, port: 9901 }
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /ready, port: 9901 }
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          {{- toYaml .Values.facade.resources | nindent 10 }}
        volumeMounts:
        - { name: envoy-config, mountPath: /etc/envoy, readOnly: true }
        - { name: routes, mountPath: /etc/envoy/routes }
      - name: writer
        image: {{ default (include "omnix.api.image" .) .Values.facade.writerImage }}
        command: ["python", "-m", "omnix.cloud.cutover.facade_writer_runner"]
        env:
        - name: OMNIX_FACADE_ROUTES_PATH
          value: /etc/envoy/routes/routes.json
        - name: OMNIX_FACADE_CANDIDATE_TEMPLATE
          value: {{ default "candidate_{unit}" .Values.facade.candidateServiceTemplate | quote }}
        - name: OMNIX_CONTROLLER_URL
          value: "http://{{ include "omnix.fullname" . }}-api:8080"
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits:   { cpu: 250m, memory: 256Mi }
        volumeMounts:
        - { name: routes, mountPath: /etc/envoy/routes }
      volumes:
      - name: envoy-config
        configMap:
          name: {{ include "omnix.fullname" . }}-facade-envoy
          items:
          - { key: envoy.yaml, path: envoy.yaml }
      - name: routes
        emptyDir: {}
      - name: routes-seed
        configMap:
          name: {{ include "omnix.fullname" . }}-facade-routes
{{- end }}
