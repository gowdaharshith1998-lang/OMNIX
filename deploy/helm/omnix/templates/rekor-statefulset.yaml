{{- if .Values.rekor.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "omnix.fullname" . }}-rekor
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: rekor
spec:
  serviceName: {{ include "omnix.fullname" . }}-rekor
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      component: rekor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        component: rekor
    spec:
      containers:
      - name: rekor-server
        image: {{ .Values.rekor.image | quote }}
        args:
        - "serve"
        - "--rekor_server.address=0.0.0.0"
        - "--rekor_server.port=3000"
        - "--trillian_log_server.address=localhost"
        - "--trillian_log_server.port=8090"
        - "--enable_attestation_storage=true"
        ports:
        - { name: rest, containerPort: 3000 }
        - { name: metrics, containerPort: 2112 }
        readinessProbe:
          httpGet: { path: /ping, port: 3000 }
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /ping, port: 3000 }
          initialDelaySeconds: 60
          periodSeconds: 30
        resources:
          requests: { cpu: 500m, memory: 1Gi }
          limits:   { cpu: 2, memory: 4Gi }
        volumeMounts:
        - { name: rekor-data, mountPath: /var/run/rekor }
        - { name: signing-key, mountPath: /etc/rekor/keys, readOnly: true }
      - name: trillian-logserver
        image: {{ .Values.rekor.trillian.image | quote }}
        args:
        - "--storage_system=mysql"
        - "--mysql_uri={{ include "omnix.rekor.trillianMysqlUri" . }}"
        - "--rpc_endpoint=0.0.0.0:8090"
        - "--http_endpoint=0.0.0.0:8091"
        ports:
        - { name: rpc, containerPort: 8090 }
        - { name: tlhttp, containerPort: 8091 }
        resources:
          requests: { cpu: 500m, memory: 1Gi }
          limits:   { cpu: 2, memory: 4Gi }
      - name: trillian-logsigner
        image: {{ .Values.rekor.trillian.signerImage | quote }}
        args:
        - "--storage_system=mysql"
        - "--mysql_uri={{ include "omnix.rekor.trillianMysqlUri" . }}"
        - "--http_endpoint=0.0.0.0:8092"
        - "--force_master=true"
        ports:
        - { name: signer, containerPort: 8092 }
        resources:
          requests: { cpu: 250m, memory: 512Mi }
          limits:   { cpu: 1, memory: 1Gi }
      volumes:
      - name: signing-key
        secret:
          secretName: omnix-rekor-signing
          optional: true
  volumeClaimTemplates:
  - metadata:
      name: rekor-data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.rekor.storage.className }}
      storageClassName: {{ .Values.rekor.storage.className | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.rekor.storage.size }}
{{- end }}
