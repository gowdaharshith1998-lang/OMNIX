{{- if .Values.facade.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omnix.fullname" . }}-facade-envoy
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: facade
data:
  envoy.yaml: |
    # Envoy v1.32 static bootstrap.
    # The dynamic route config is loaded from /etc/envoy/routes/routes.json
    # which the facade_writer sidecar atomically updates on every signed shift.
    node:
      id: omnix-facade
      cluster: omnix-facade-cluster
    static_resources:
      listeners:
      - name: omnix_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: 8080 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              codec_type: AUTO
              stat_prefix: omnix
              rds:
                config_source:
                  path_config_source:
                    path: /etc/envoy/routes/routes.json
                route_config_name: omnix_routes
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: legacy_default
        connect_timeout: 1s
        type: STRICT_DNS
        load_assignment:
          cluster_name: legacy_default
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.facade.legacyService | default "legacy.default.svc.cluster.local" | quote }}
                    port_value: 80
      - name: candidate_default
        connect_timeout: 1s
        type: STRICT_DNS
        load_assignment:
          cluster_name: candidate_default
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.facade.candidateServiceTemplate | default "candidate.default.svc.cluster.local" | quote }}
                    port_value: 80
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
{{- end }}
