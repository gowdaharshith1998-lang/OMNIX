{{- if .Values.facade.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omnix.fullname" . }}-facade-envoy
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: facade
data:
  envoy.yaml: |
    # Envoy v1.32 bootstrap for the OMNIX strangler-fig facade.
    #
    # Mode {{ .Values.facade.mode }}:
    {{- if eq .Values.facade.mode "dynamic" }}
    #   - dynamic_resources.cds_config — filesystem CDS, ~1s mtime poll.
    #     Writer sidecar writes {{ .Values.facade.paths.clusters }} on every
    #     authorized shift so per-unit clusters appear without helm upgrade.
    #   - listener's rds — filesystem RDS reading {{ .Values.facade.paths.routes }}.
    #   - No static_resources.clusters; the writer is the single source.
    {{- else }}
    #   - Static cluster list rendered inline from .Values.facade.staticUnits.
    #     Writer in static mode only drives routes.json; clusters never change
    #     at runtime. Use this when filesystem CDS is disallowed (air-gapped,
    #     regulated envs).
    {{- end }}
    node:
      id: facade-{{ .Release.Name }}
      cluster: omnix-facade
    admin:
      # 0.0.0.0 because the kubelet's readinessProbe HTTP GET hits the
      # pod IP — binding to 127.0.0.1 makes the probe ECONNREFUSED.
      # NetworkPolicy + the absence of a Service in front of 9901
      # keeps the admin endpoint reachable only from the pod itself +
      # the kubelet on the node.
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
    {{- if eq .Values.facade.mode "dynamic" }}
    dynamic_resources:
      cds_config:
        path: {{ .Values.facade.paths.clusters | quote }}
    static_resources:
      listeners:
      - name: facade_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: 8080 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              codec_type: AUTO
              stat_prefix: facade
              rds:
                route_config_name: omnix_routes
                config_source:
                  path: {{ .Values.facade.paths.routes | quote }}
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
    {{- else }}
    static_resources:
      listeners:
      - name: facade_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: 8080 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              codec_type: AUTO
              stat_prefix: facade
              rds:
                route_config_name: omnix_routes
                config_source:
                  path: {{ .Values.facade.paths.routes | quote }}
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      {{- include "omnix.facade.staticClusters" . | nindent 6 }}
    {{- end }}
{{- end }}
