{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnix.fullname" . }}-worker
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        component: worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: worker
        image: {{ include "omnix.worker.image" . }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        command: ["celery"]
        args:
        - "-A"
        - "omnix.cloud.tasks.celery_app:celery_app"
        - "worker"
        - "--loglevel=info"
        - "-Q"
        - {{ join "," .Values.worker.queues | quote }}
        env:
        {{- if .Values.postgres.subchart.enabled }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "omnix.fullname" . }}-postgres-creds
              key: password
        - name: OMNIX_DATABASE_URL
          value: {{ include "omnix.postgres.dsn" . | quote }}
        {{- else if .Values.postgres.external.dsn }}
        - name: OMNIX_DATABASE_URL
          value: {{ .Values.postgres.external.dsn | quote }}
        {{- else }}
        - name: OMNIX_DATABASE_URL
          valueFrom:
            secretKeyRef: { name: omnix-db-dsn, key: async-url }
        - name: OMNIX_SYNC_DATABASE_URL
          valueFrom:
            secretKeyRef: { name: omnix-db-dsn, key: sync-url }
        {{- end }}
        - name: OMNIX_REDIS_URL
          valueFrom:
            secretKeyRef: { name: omnix-redis-dsn, key: url }
        resources: {{ toYaml .Values.worker.resources | nindent 10 }}
{{- end }}
