apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "omnix.fullname" . }}-smoke-test"
  labels:
    {{- include "omnix.labels" . | nindent 4 }}
    component: helm-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: smoke
    image: curlimages/curl:8.10.1
    command:
    - sh
    - -c
    - |
      set -eu
      echo "==> GET /health on api"
      curl -fsS --max-time 5 "http://{{ include "omnix.fullname" . }}-api:{{ .Values.api.service.port | default 8080 }}/health"
      echo ""
      {{- if .Values.studio.enabled }}
      echo "==> GET / on studio (HTTP code only)"
      code=$(curl -fsS --max-time 5 -o /dev/null -w "%{http_code}" "http://{{ include "omnix.fullname" . }}-studio:{{ .Values.studio.service.port | default 8081 }}/" || true)
      echo "studio HTTP $code"
      test "$code" = "200" || { echo "studio not 200"; exit 1; }
      {{- end }}
      {{- if .Values.facade.enabled }}
      echo "==> GET /healthz on facade (best-effort)"
      curl -fsS --max-time 5 "http://{{ include "omnix.fullname" . }}-facade:8080/healthz" || echo "facade healthz not configured; non-fatal"
      {{- end }}
      echo "SMOKE OK"
    resources:
      requests: { cpu: 10m, memory: 16Mi }
      limits:   { cpu: 100m, memory: 64Mi }
