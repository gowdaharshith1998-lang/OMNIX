{{- if .Values.ironstream.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mainframe.fullname" . }}-ironstream
  labels:
    {{- include "mainframe.labels" . | nindent 4 }}
    vendor: ironstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mainframe
      vendor: ironstream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mainframe
        vendor: ironstream
    spec:
      containers:
      - name: bridge
        image: {{ include "mainframe.image" . }}
        command: ["python", "-m", "omnix.cloud.observe.mainframe_bridge",
                  "--vendor", "ironstream"]
        env:
        - name: OMNIX_MAINFRAME_TOPIC
          value: {{ .Values.ironstream.topic | quote }}
        - name: OMNIX_MAINFRAME_BOOTSTRAP
          value: {{ required "mainframe.ironstream.bootstrapServers required" .Values.ironstream.bootstrapServers | quote }}
        - name: OMNIX_MAINFRAME_GROUP
          value: {{ .Values.ironstream.consumerGroup | quote }}
        - name: OMNIX_COLLECTOR_URL
          value: {{ .Values.collectorUrl | quote }}
        ports:
        - { name: metrics, containerPort: 9052 }
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
{{- end }}
