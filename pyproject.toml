[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "omnix"
version = "0.1.0"
description = "Code intelligence platform with AXIOM ML-DSA-65 provenance"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cryptography>=42.0",
    "click>=8.1",
    "fastapi>=0.110",
    "hypothesis>=6.100",
    "keyring>=25.0",
    "uvicorn[standard]>=0.25",
    "watchdog>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
omnix = "cli:main"

[tool.setuptools]
package-dir = { "" = "src" }
packages = ["axiom", "scan", "scan.turboscan", "fabric", "fabric.providers", "providers", "verify", "find_bugs", "parser"]
py-modules = ["cli"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
